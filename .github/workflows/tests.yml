name: verification

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync locked environment
        run: uv sync --locked
      - name: Ruff
        run: uv run ruff check .
      - name: Focused tests
        run: uv run pytest
      - name: Fresh rendered replay
        run: uv run n9-demo
      - name: Evidence audit and fresh proof
        run: uv run n9-verify
